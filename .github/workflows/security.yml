name: Security Audit

on:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 0 * * 0'  # Weekly

jobs:
  security-audit:
    runs-on: ubuntu-latest
    name: Security Audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Run type checks
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: audit-report
          path: npm-audit.json
